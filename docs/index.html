<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Popup Report Archive</title>
  <style>
    :root{
      --bg:#0b0f19;
      --card:#ffffff;
      --muted:#6b7280;
      --line:#e5e7eb;
    }
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",Arial,sans-serif;
      background: radial-gradient(1200px 800px at 10% -10%, rgba(124,58,237,0.35), transparent 60%),
                  radial-gradient(1200px 800px at 90% 0%, rgba(59,130,246,0.25), transparent 55%),
                  #0b0f19;
      color:#fff;
    }
    .wrap{max-width:1100px;margin:0 auto;padding:26px 18px 40px;}
    .header{
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 18px;
      padding: 18px 18px;
      backdrop-filter: blur(10px);
    }
    h1{margin:0;font-size:22px;letter-spacing:-0.2px}
    .sub{margin-top:6px;color:rgba(255,255,255,0.72);font-size:13px;line-height:1.4}

    .controls{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0 14px}
    .search{
      flex:1 1 280px;
      background:#fff;border-radius:14px;
      padding:12px 12px;border:0;outline:none;
      font-size:14px;color:#111;
    }
    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap:12px;
      margin-top: 10px;
    }
    .card{
      display:block;
      text-decoration:none;
      background: rgba(255,255,255,0.95);
      color:#111;
      border-radius: 18px;
      padding: 14px 16px;
      border: 1px solid rgba(255,255,255,0.65);
      box-shadow: 0 10px 30px rgba(0,0,0,0.20);
      transition: transform .12s ease, box-shadow .12s ease;
    }
    .card:hover{ transform: translateY(-2px); box-shadow: 0 14px 40px rgba(0,0,0,0.26); }
    .top{display:flex;gap:10px;align-items:flex-start;justify-content:space-between;}
    .title{font-weight:900;font-size:16px;letter-spacing:-0.1px}
    .meta{margin-top:8px;color:#6b7280;font-size:12px;word-break:break-all}

    .badges{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
    .badge{
      display:inline-block;
      padding:5px 9px;
      border-radius:999px;
      font-size:11px;
      border: 1px solid rgba(0,0,0,0.06);
      background:#f3f4f6;
      color:#111827;
      white-space:nowrap;
    }
    .badge.period{ background:#eef2ff; color:#3730a3; }
    .badge.store{ background:#ecfeff; color:#155e75; }

    .empty{
      margin-top:14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 18px;
      padding: 14px 16px;
      color: rgba(255,255,255,0.75);
      font-size: 13px;
      display:none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>📊 Popup Report Archive</h1>
      <div class="sub">기간/지점 뱃지를 자동으로 표시합니다. 검색창에서 빠르게 찾을 수 있어요.</div>
    </div>

    <div class="controls">
      <input id="q" class="search" placeholder="검색 (예: 2026-02, chabot, seongsu)" />
    </div>

    <div id="grid" class="grid">
      
      <a class='card' href='https://315seconds.github.io/sales_report/popup/2026-03-02_seongsu/' data-name='2026-03-02_seongsu'>
        <div class='top'>
          <div class='title'>seongsu</div>
          <div class='badges'><span class='badge period'>2026-03-02</span><span class='badge store'>seongsu</span></div>
        </div>
        <div class='meta'>2026-03-02_seongsu</div>
      </a>
      <a class='card' href='https://315seconds.github.io/sales_report/popup/2026-02-04_2026-02-09_chabot/' data-name='2026-02-04_2026-02-09_chabot'>
        <div class='top'>
          <div class='title'>chabot</div>
          <div class='badges'><span class='badge period'>2026-02-04 ~ 2026-02-09</span><span class='badge store'>chabot</span></div>
        </div>
        <div class='meta'>2026-02-04_2026-02-09_chabot</div>
      </a>
    </div>

    <div id="empty" class="empty">검색 결과가 없습니다.</div>
  </div>

  <script>
    const q = document.getElementById('q');
    const cards = Array.from(document.querySelectorAll('.card'));
    const empty = document.getElementById('empty');

    function run(){
      const s = (q.value || '').toLowerCase().trim();
      let shown = 0;
      for(const c of cards){
        const name = (c.dataset.name || '').toLowerCase();
        const ok = !s || name.includes(s);
        c.style.display = ok ? '' : 'none';
        if(ok) shown++;
      }
      empty.style.display = (shown === 0) ? '' : 'none';
    }
    q.addEventListener('input', run);
    run();
  </script>
</body>
</html>
