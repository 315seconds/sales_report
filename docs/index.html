<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>마켓인유 리포트 아카이브</title>
  <style>
    :root{
      --bg:#fbfbff; --ink:#111827; --muted:#6b7280; --line:#e5e7eb;
      --p1:rgba(255,179,186,0.18); --p2:rgba(186,225,255,0.18);
      --p3:rgba(255,223,186,0.14); --p4:rgba(186,255,201,0.14);
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",Arial,sans-serif;
      background:var(--bg); color:var(--ink);
    }
    .bg{position:fixed;inset:0;pointer-events:none;z-index:-1;overflow:hidden;}
    .blob{position:absolute;border-radius:999px;filter:blur(46px);}
    .b1{width:520px;height:520px;left:-190px;top:-240px;background:var(--p1);}
    .b2{width:560px;height:560px;right:-230px;top:-260px;background:var(--p2);}
    .b3{width:520px;height:520px;left:-170px;bottom:-260px;background:var(--p4);}
    .b4{width:520px;height:520px;right:-210px;bottom:-280px;background:var(--p3);}
    .wrap{max-width:1100px;margin:0 auto;padding:26px 18px 60px;}
    .header{
      background:rgba(255,255,255,0.86); border:1px solid rgba(229,231,235,0.95);
      border-radius:18px; padding:18px 20px;
      box-shadow:0 10px 30px rgba(17,24,39,0.06); backdrop-filter:blur(8px);
    }
    h1{margin:0;font-size:22px;letter-spacing:-0.2px;}
    .sub{margin-top:6px;color:var(--muted);font-size:13px;line-height:1.5;}
    .section{
      margin-top:16px; background:rgba(255,255,255,0.92);
      border:1px solid rgba(229,231,235,0.95); border-radius:18px;
      padding:16px 18px; box-shadow:0 10px 30px rgba(17,24,39,0.05);
    }
    .section-title{
      display:flex; align-items:center; gap:8px;
      margin:0 0 14px; font-size:15px; font-weight:800; letter-spacing:-0.1px;
    }
    .chip{
      font-size:10px; font-weight:700; padding:3px 8px; border-radius:999px;
      background:#f0fdf4; color:#15803d; border:1px solid #bbf7d0;
    }
    .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
    .tab{
      padding:6px 14px; border-radius:999px; font-size:12px; font-weight:700;
      border:1px solid var(--line); background:#fff; color:var(--muted);
      cursor:pointer; transition:all .12s;
    }
    .tab.active{background:#111827;color:#fff;border-color:#111827;}
    .month-panel{display:none;}
    .month-panel.active{display:block;}
    .month-kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;}
    .month-kpi{background:#f9fafb;border:1px solid var(--line);border-radius:12px;padding:10px 12px;}
    .month-kpi .k{color:var(--muted);font-size:11px;}
    .month-kpi .v{font-weight:800;font-size:15px;margin-top:3px;}
    .insight{
      margin-top:16px;
      background:linear-gradient(135deg,rgba(238,242,255,0.9),rgba(236,254,255,0.9));
      border:1px solid rgba(165,180,252,0.4); border-radius:18px;
      padding:14px 18px; box-shadow:0 8px 20px rgba(17,24,39,0.04);
    }
    .insight-title{font-size:13px;font-weight:800;margin:0 0 10px;color:#3730a3;}
    .insight-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;}
    .insight-item{
      background:rgba(255,255,255,0.7); border-radius:12px;
      padding:10px 12px; border:1px solid rgba(165,180,252,0.25);
    }
    .insight-item .ik{font-size:11px;color:#6b7280;}
    .insight-item .iv{font-size:14px;font-weight:800;margin-top:3px;}
    .insight-item .iv.up{color:#15803d;}
    .insight-item .iv.hl{color:#3730a3;}
    .controls{display:flex;gap:10px;margin-bottom:12px;}
    .search{
      flex:1 1 240px; background:#fff; border-radius:12px;
      padding:10px 14px; border:1px solid rgba(229,231,235,0.95);
      outline:none; font-size:13px; color:#111;
      box-shadow:0 4px 12px rgba(17,24,39,0.04);
    }
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px;}
    .card{
      display:block; text-decoration:none; background:rgba(255,255,255,0.94);
      color:#111; border-radius:16px; padding:14px 16px;
      border:1px solid rgba(229,231,235,0.95);
      box-shadow:0 8px 24px rgba(17,24,39,0.06);
      transition:transform .12s ease, box-shadow .12s ease;
    }
    .card:hover{transform:translateY(-2px);box-shadow:0 14px 36px rgba(17,24,39,0.10);}
    .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
    .card-title{font-weight:900;font-size:15px;letter-spacing:-0.1px;}
    .card-kpis{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px;}
    .ck{background:#f9fafb;border-radius:10px;padding:7px 9px;border:1px solid var(--line);}
    .ck .cl{font-size:10px;color:var(--muted);}
    .ck .cv{font-size:13px;font-weight:800;margin-top:2px;}
    .badges{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end;}
    .badge{
      display:inline-block; padding:4px 8px; border-radius:999px;
      font-size:10px; font-weight:600; border:1px solid rgba(0,0,0,0.06);
      background:#f3f4f6; color:#111827; white-space:nowrap;
    }
    .badge.period{background:#eef2ff;color:#3730a3;}
    .badge.cat{background:#fdf4ff;color:#7e22ce;}
    .badge.for{background:#fff7ed;color:#c2410c;}
    .empty{padding:14px 16px;color:var(--muted);font-size:13px;display:none;}
    .loading{color:var(--muted);font-size:12px;font-style:italic;}
    .no-data{color:#9ca3af;font-size:12px;}
    .detail-link{
      display:inline-flex; align-items:center; gap:4px;
      margin-top:12px; padding:7px 14px;
      background:#111827; color:#fff;
      border-radius:999px; font-size:12px; font-weight:700;
      text-decoration:none; transition:opacity .12s;
    }
    .detail-link:hover{opacity:0.8;}
    .panel-footer{display:flex; justify-content:flex-end; margin-top:4px;}
  </style>
</head>
<body>
<div class="bg">
  <div class="blob b1"></div><div class="blob b2"></div>
  <div class="blob b3"></div><div class="blob b4"></div>
</div>
<div class="wrap">

  <div class="header">
    <h1>📊 마켓인유 리포트 아카이브</h1>
    <div class="sub">성수본점 월별 현황 · 팝업 리포트를 한곳에서 확인합니다.</div>
  </div>

  <div class="section">
    <div class="section-title">🏠 성수본점 <span class="chip">PERMANENT</span></div>
    <div class="tabs" id="mainTabs"><span class="loading">불러오는 중…</span></div>
    <div id="mainPanels"></div>
  </div>

  <div class="insight" id="insightBox" style="display:none;">
    <div class="insight-title">💡 본점 × 팝업 비교 인사이트</div>
    <div class="insight-grid" id="insightGrid"></div>
  </div>

  <div class="section" style="margin-top:16px;">
    <div class="section-title">📍 팝업 아카이브</div>
    <div class="controls">
      <input id="q" class="search" placeholder="검색 (예: 연무장, 2026-03, yeonmoo)"/>
    </div>
    <div id="grid" class="grid"><span class="loading">불러오는 중…</span></div>
    <div id="empty" class="empty">검색 결과가 없습니다.</div>
  </div>

</div>

<script>
/* ══════════════════════════════════════════════
   ★ 유일하게 수정하는 부분: GitHub Pages 기본 URL
   ══════════════════════════════════════════════ */
const BASE = "https://315seconds.github.io/sales_report";

const MAIN_MANIFEST  = BASE + "/main/manifest.json";
const POPUP_MANIFEST = BASE + "/popup/manifest.json";

/* ── 유틸 ── */
function fmt(n){ return Number(n||0).toLocaleString('ko-KR'); }
function fmtPct(n){ return (Number(n||0)*100).toFixed(1)+'%'; }
function fmtWon(n){
  const x = Number(n||0);
  if(x>=1e8) return (x/1e8).toFixed(1)+'억원';
  if(x>=1e4) return Math.round(x/1e4)+'만원';
  return fmt(x)+'원';
}
async function fetchJSON(url){
  try{
    const r = await fetch(url,{cache:"no-store"});
    if(!r.ok) return null;
    return await r.json();
  }catch(e){ return null; }
}

/* ══════════════════════════════════════════════
   성수본점 섹션
   ══════════════════════════════════════════════ */
const tabsEl   = document.getElementById('mainTabs');
const panelsEl = document.getElementById('mainPanels');
let mainMetaList = [];

function monthKpisHTML(m, href){
  if(!m) return `<div class="no-data">데이터를 불러올 수 없습니다.</div>`;
  const daily = m.daily_avg_sales||(m.days?Math.round(m.total_sales/m.days):0);
  const detailBtn = href
    ? `<div class="panel-footer"><a class="detail-link" href="${href}" target="_blank">상세 리포트 →</a></div>`
    : '';
  return `<div class="month-kpis">
    <div class="month-kpi"><div class="k">월 총 매출</div><div class="v">${fmtWon(m.total_sales)}</div></div>
    <div class="month-kpi"><div class="k">일 평균 매출</div><div class="v">${fmtWon(daily)}</div></div>
    <div class="month-kpi"><div class="k">거래건수</div><div class="v">${fmt(m.total_cnt)}건</div></div>
    <div class="month-kpi"><div class="k">해외 비중</div><div class="v">${fmtPct(m.foreign_share)}</div></div>
    <div class="month-kpi"><div class="k">국내 매출</div><div class="v">${fmtWon(m.dom_sales)}</div></div>
    <div class="month-kpi"><div class="k">해외 매출</div><div class="v">${fmtWon(m.for_sales)}</div></div>
    <div class="month-kpi"><div class="k">피크타임</div><div class="v">${m.peak_hour!=null?m.peak_hour+'시':'—'}</div></div>
    <div class="month-kpi"><div class="k">TOP 카테고리</div><div class="v">${m.top_category||'—'}</div></div>
  </div>${detailBtn}`;
}

async function buildMainSection(){
  const manifest = await fetchJSON(MAIN_MANIFEST);
  if(!manifest||!manifest.months||!manifest.months.length){
    tabsEl.innerHTML=`<span class="no-data">등록된 월 데이터가 없습니다.</span>`;
    return;
  }
  tabsEl.innerHTML=''; panelsEl.innerHTML='';
  for(let i=0;i<manifest.months.length;i++){
    const {label,url,href} = manifest.months[i];
    const tab = document.createElement('button');
    tab.className='tab'+(i===0?' active':'');
    tab.textContent=label;
    tab.addEventListener('click',()=>{
      document.querySelectorAll('#mainTabs .tab').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.month-panel').forEach(p=>p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('mp-'+i).classList.add('active');
    });
    tabsEl.appendChild(tab);
    const panel=document.createElement('div');
    panel.className='month-panel'+(i===0?' active':'');
    panel.id='mp-'+i;
    panel.innerHTML=`<div class="loading">불러오는 중…</div>`;
    panelsEl.appendChild(panel);
    const meta=await fetchJSON(url);
    mainMetaList.push({label,meta});
    panel.innerHTML=monthKpisHTML(meta, href||null);
  }
  tryInsight();
}

/* ══════════════════════════════════════════════
   인사이트
   ══════════════════════════════════════════════ */
let popupMetaList=[];

function tryInsight(){
  const mainMeta=mainMetaList.find(r=>r.meta)?.meta;
  if(!mainMeta||popupMetaList.length===0) return;
  const pn=popupMetaList.length;
  const avgDaily=popupMetaList.reduce((a,m)=>a+(m.daily_avg_sales||(m.days?Math.round(m.total_sales/m.days):0)),0)/pn;
  const avgFor=popupMetaList.reduce((a,m)=>a+(Number(m.foreign_share)||0),0)/pn;
  const mainDaily=mainMeta.daily_avg_sales||(mainMeta.days?Math.round(mainMeta.total_sales/mainMeta.days):0);
  const hc={};
  for(const m of popupMetaList) if(m.peak_hour!=null){const k=String(m.peak_hour);hc[k]=(hc[k]||0)+1;}
  const topH=Object.entries(hc).sort((a,b)=>b[1]-a[1])[0];
  const items=[
    {label:`본점 일평균 (${mainMetaList[0]?.label||''})`, value:fmtWon(mainDaily), cls:''},
    {label:`팝업 일평균 (최근 ${pn}개 평균)`, value:fmtWon(avgDaily), cls:''},
    {label:'본점 해외 비중', value:fmtPct(mainMeta.foreign_share), cls:'hl'},
    {label:`팝업 해외 비중 (평균)`, value:fmtPct(avgFor), cls:'hl'},
    {label:'본점 피크타임', value:mainMeta.peak_hour!=null?mainMeta.peak_hour+'시':'—', cls:'up'},
    {label:'팝업 공통 피크타임', value:topH?topH[0]+'시':'—', cls:'up'},
  ];
  document.getElementById('insightGrid').innerHTML=items.map(it=>`
    <div class="insight-item">
      <div class="ik">${it.label}</div>
      <div class="iv ${it.cls}">${it.value}</div>
    </div>`).join('');
  document.getElementById('insightBox').style.display='';
}

/* ══════════════════════════════════════════════
   팝업 아카이브
   ══════════════════════════════════════════════ */
const gridEl=document.getElementById('grid');
const emptyEl=document.getElementById('empty');
const qEl=document.getElementById('q');

function cardKpisHTML(m){
  if(!m) return `<div class="no-data" style="grid-column:1/-1;font-size:11px;">데이터 없음</div>`;
  const daily=m.daily_avg_sales||(m.days?Math.round(m.total_sales/m.days):0);
  return `
    <div class="ck"><div class="cl">일평균 매출</div><div class="cv">${fmtWon(daily)}</div></div>
    <div class="ck"><div class="cl">해외 비중</div><div class="cv">${fmtPct(m.foreign_share)}</div></div>
    <div class="ck"><div class="cl">피크타임</div><div class="cv">${m.peak_hour!=null?m.peak_hour+'시':'—'}</div></div>
    <div class="ck"><div class="cl">TOP 카테고리</div><div class="cv">${m.top_category||'—'}</div></div>`;
}

function runFilter(){
  const s=(qEl.value||'').toLowerCase().trim();
  const cards=Array.from(document.querySelectorAll('.card'));
  let shown=0;
  for(const c of cards){
    // data-search(한글+영문+날짜) 또는 data-name 둘 다 검색
    const searchText=(c.dataset.search||c.dataset.name||'').toLowerCase();
    const ok=!s||searchText.includes(s);
    c.style.display=ok?'':'none';
    if(ok) shown++;
  }
  emptyEl.style.display=shown===0?'':'none';
}
qEl.addEventListener('input',runFilter);

async function buildPopupSection(){
  const manifest=await fetchJSON(POPUP_MANIFEST);
  if(!manifest||!manifest.popups||!manifest.popups.length){
    gridEl.innerHTML=`<span class="no-data">등록된 팝업 데이터가 없습니다.</span>`;
    return;
  }
  gridEl.innerHTML='';
  for(let i=0;i<manifest.popups.length;i++){
    const {name,label,start,end,href,meta_url}=manifest.popups[i];
    const card=document.createElement('a');
    card.className='card'; card.href=href; card.dataset.name=name;
    // 한글 label, 영문 slug, 날짜 모두 검색 가능하도록
    card.dataset.search=`${label} ${name} ${start} ${end}`.toLowerCase();
    card.innerHTML=`
      <div class="card-top">
        <div class="card-title">${label}</div>
        <div class="badges"><span class="badge period">${start} ~ ${end}</span></div>
      </div>
      <div class="card-kpis" id="ck-${i}"><div class="loading">로딩 중…</div></div>`;
    gridEl.appendChild(card);
    const meta=await fetchJSON(meta_url);
    document.getElementById('ck-'+i).innerHTML=cardKpisHTML(meta);
    if(meta){
      popupMetaList.push(meta);
      const b=card.querySelector('.badges');
      if(meta.top_category) b.innerHTML+=`<span class="badge cat">${meta.top_category}</span>`;
      if(meta.foreign_share>0.15) b.innerHTML+=`<span class="badge for">🌍 ${fmtPct(meta.foreign_share)}</span>`;
      tryInsight();
    }
  }
  runFilter();
}

buildMainSection();
buildPopupSection();
</script>
</body>
</html>
